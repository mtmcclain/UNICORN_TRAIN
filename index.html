<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Unicorn Train</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="controls-hint" class="visible">
      UNICORN TRAIN — W/↑ faster · S/↓ slower · H/Space honk · X/Click magic · pop rainbow balloons!
    </div>
    <div id="mobile-hint" class="visible">
      Hold FASTER/SLOWER to drive · Tap POP! for magic · Pop rainbow balloons · Score at top
    </div>
    <div id="touch-controls" aria-label="Game controls">
      <div class="touch-row speed-row">
        <button type="button" class="touch-btn" data-action="speedDown" aria-label="Slow down">SLOWER</button>
        <button type="button" class="touch-btn" data-action="speedUp" aria-label="Speed up">FASTER</button>
      </div>
      <div class="touch-row action-row">
        <button type="button" class="touch-btn touch-btn-action" data-action="horn" aria-label="Honk horn">HONK</button>
        <button type="button" class="touch-btn touch-btn-action touch-btn-pop" data-action="magic" aria-label="Shoot magic to pop balloons">POP!</button>
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
